pre-commit:
  parallel: true
  commands:
    prettier:
      run: bun format -- {staged_files}
      glob: "*.{ts,tsx,js,jsx,json}"
    eslint:
      run: bun lint -- {staged_files}
      glob: "src/**/*.{ts,tsx,js,jsx}"
    tsc:
      run: bun tsc --noEmit
      glob: "src/**/*.{ts,tsx,js,jsx}"

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: bun commitlint --edit $1